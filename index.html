    @keyframes knight_attack {
    from {
        background-position-x: 0px;
      }
      to {
        background-position-x: -796px;
      }
    }

    @keyframes gold_knight_attack {
          from {
        background-position-x: 0px;
      }
      to {
        background-position-x: -804px;
      }
    }

    @keyframes bloodbug {
          from {
        background-position-x: 0px;
      }
      to {
        background-position-x: -942px;
      }
    }

    #spinner {
        display:flex;
        justify-content:center;
        align-items: flex-end;
        width: 288px;
        height: 168px;
        position:absolute;
        z-index:6;
        left: 0; 
        right: 0;
        top: 50%; 
        margin-left: auto; 
        margin-right: auto;
        transform: translateY(-50%);  
    }

    .character {
        will-change: transform;
        z-index: 1;
        transition: all ease;
    }

    .knight {
        width: 111px;
        height: 118px;
        left:186px;
        background: url("/knight.c88c7613.png") no-repeat;
        animation: knight_attack .55s steps(7) infinite;
    }

    .goldKnight {
    width: 112px;
    height: 106px;
    transform: rotateY(-180deg);
    background: url("/gold_knight.3fc415c4.png") no-repeat;
    animation: gold_knight_attack .55s steps(7) infinite;
    }

    .bloodBug {
      width: 74px;
      height: 80px;
      margin: 0px -16px 0px -18px;
      text-align:center;
      background: url("/bloodbug.078ba704.png") no-repeat;
      background-position-y: 30px;
      animation: bloodbug 1.35s steps(12) infinite;
      z-index: 2;
    }

    .explosion {
        width: 74px;
        height: 51px;
        background: url("/ZUiY.eca70e62.gif") no-repeat;
        background-size: contain;
        background-position-y: 0px;
        z-index:3;
    }

    .bug {
      color:#fb2502;
      font-size:20px;
      font-family: "KreepTown";
    }

    .loading {
      color: #bb02bb;
      font-size:34px;
      font-family: "KreepTown";
      position:absolute;
      top:0px;
    }</style>
